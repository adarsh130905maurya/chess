<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A two-player chess game you can play in the browser. Share a link to play with a friend.">
  <title>Chess Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Chess Game</h1>
    
    <!-- Game ID Display -->
    <div id="gameIdDisplay" class="game-id-section">
      <p>Game ID: <span id="gameIdValue">loading...</span></p>
      <button id="copyGameIdBtn" title="Copy shareable link">Copy Link</button>
      <button id="newGameBtn" title="Start a brand-new game">New Game</button>
    </div>

    <!-- Chess board rendered here by script.js -->
    <div id="board"></div>

    <!-- Move input + action buttons -->
    <form id="moveForm">
      <input type="text" id="moveInput" placeholder="Enter move e.g., e2 e4" autocomplete="off" spellcheck="false">
      <button type="submit">Submit Move</button>
    </form>
    
    <button id="restartBtn">Restart Game</button>

    <!-- Error Display -->
    <div id="errorDisplay" class="error-message" style="display:none;"></div>

    <!-- Status Messages Display -->
    <div id="statusDisplay" class="status-message" style="display:none;"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
